name: Déploiement GitHub Pages (frontend)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Préparer le contenu (dossier frontend uniquement)
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
